# Kitty Configuration (modeled after Alacritty config)

# Font Configuration
font_family      JetBrainsMono Nerd Font Mono ExtraLight
bold_font        JetBrainsMono Nerd Font Mono Regular
italic_font      JetBrainsMono Nerd Font Mono Light Italic
bold_italic_font JetBrainsMono Nerd Font Mono Italic
font_size        16.0

# Font rendering
adjust_line_height  1
adjust_column_width 1

# Terminal type
term xterm-256color

# Window Configuration
dynamic_background_opacity yes
hide_window_decorations titlebar-only
macos_option_as_alt both
macos_titlebar_color background

# Clipboard
copy_on_select yes

# Selection word characters (inverse of semantic_escape_chars)
select_by_word_characters @-./_~?&=%+#

# Auto reload config
allow_remote_control yes
listen_on unix:/tmp/kitty

# Gruvbox Dark Color Scheme
# Background and foreground
background #282828
foreground #ebdbb2

# Selection colors
selection_background #ebdbb2
selection_foreground #282828

# Cursor colors
cursor #ebdbb2
cursor_text_color background

# Normal colors
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright colors
color8   #928374
color9   #fb4934
color10  #b8bb26
color11  #fabd2f
color12  #83a598
color13  #d3869b
color14  #8ec07c
color15  #ebdbb2
