# ---------- Detect OS ----------
# lowercase uname
# run-shell 'tmux set-environment -g TMUX_OS "$(uname -s | tr "[:upper:]" "[:lower:]")"'

set -g mouse on
# # Use vim keybindings in copy mode
setw -g mode-keys vi

# fzf session picker
bind a display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# ---------- Terminal Settings ----------
if-shell '[ "$TMUX_OS" = "darwin" ]' {
  set-option -g default-terminal 'alacritty'; set-environment -g TERM 'alacritty'; set-environment -g COLORTERM 'truecolor'
  set-option -g default-terminal 'xterm-256color'; set-environment -g TERM 'xterm-256color'; set-environment -g COLORTERM 'truecolor'
}

bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

#
# # Allow tmux to send 256-color to parent terminal
set-option -ga terminal-overrides ",*-256color*:TC"

# 1. Define a single variable that detects Vim OR FZF
is_smart_app="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"

# 2. Use that variable for your Ctrl bindings
bind-key -n 'C-h' if-shell "$is_smart_app" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_smart_app" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_smart_app" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_smart_app" 'send-keys C-l' 'select-pane -R'

# ---------- Default shell ----------
if-shell '[ "$TMUX_OS" = "darwin" ]' \
  "set-option -g default-command '/bin/bash -c \"which reattach-to-user-namespace >/dev/null && exec reattach-to-user-namespace \$SHELL -l || exec \$SHELL -l\"'" \
  "set-option -g default-command '$SHELL -l'"

# ---------- Key bindings ----------
bind v split-window -h
bind s split-window -v
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind e select-layout tiled
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---------- General settings ----------
set -g prefix C-a
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 10
set -g status-position top
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# necessary for the hammerspoon switcher to look. it inspects the title.
# I could probably update to use the ipc api but...eh
set -g set-titles on
set -g set-titles-string "tmux:#S | #W"

# Run once whenever a new session is created. When a new session is created:
# - first window is opened to nvim
# - second window is a command shell
# - focus returns to window 1
set-hook -g session-created \
  "send-keys nvim C-m; \
   new-window; \
   select-window -t 1"

# Powerline rounded separators (need Nerd Font)
set -g @pl_left  "î‚¶"
set -g @pl_right "î‚´"
set -g @pl_extension "â–ˆ"
set -g @bg "#282828"
set -g @session_name_pill_bg "#a17e1f" # gold
set -g @session_name_lettering "#282828" # text inside pill
set -g @inactive_window_bg "#3c3836" # lite grey
set -g @active_window_bg "#9966cc" # lavender
set -g @inactive_window_lettering "#d2aef5" # almost white
set -g @bind_key_active "#9966cc"
set -g status-style "bg=#282828,fg=#{@inactive_window_lettering}"
set -g status-left-length 40
set -g @status_border "#9b7fbf"
set -g status-left "#[fg=#{@session_name_pill_bg},bg=#{@bg}]#[fg=#{@session_name_lettering},bg=#{@session_name_pill_bg},bold] îœ‘ #S #[fg=#{@bg},bg=#{@session_name_pill_bg}]#[fg=#{?client_prefix,#{@bind_key_active},#{@session_name_pill_bg}},bg=#{@bg}]#{@pl_extension}#{@pl_right} "
setw -g window-status-format "#[fg=#{@inactive_window_bg},bg=#{@bg}]#{@pl_left}#[fg=#{@inactive_window_lettering},bg=#{@inactive_window_bg}]#I #W#{?window_zoomed_flag, ï€‚,}#[fg=#{@inactive_window_bg},bg=#{@bg}]#{@pl_right} "
setw -g window-status-current-format "#[fg=#{@active_window_bg},bg=#{@bg}]#{@pl_left}#[fg=#{@bg},bg=#{@active_window_bg},bold]#I #W#{?window_zoomed_flag, ï€‚,}#[fg=#{@active_window_bg},bg=#{@bg}]#{@pl_right} "

# Battery level (macOS compatible)
set -g @battery_cmd "pmset -g batt | grep -Eo '[0-9]+%' | head -1"
# CPU usage (macOS compatible)
set -g @cpu_cmd "top -l 1 | awk '/CPU usage/ {printf \"%.1f%%\", 100 - $7}'"
# Available disk space (root disk)
set -g @disk_cmd "df -k / | awk 'NR==2 {printf \"%.2f%%\", (\$4 / \$2) * 100}'"

set -g status-right-length 100
set -g status-right "#[fg=#{inactive_window_lettering}]ó±Š¥ #(#{@battery_cmd}) \
#[fg=#7fbce0]î°™ #(#{@cpu_cmd}) \
#[fg=#{@session_name_pill_bg}]î‰€ #(#{@disk_cmd}) \
#[fg=#{@inactive_window_lettering}]ï€— %H:%M "

# ---------- Navigation ----------
set -g extended-keys on
unbind -n C-Tab
unbind -n C-S-Tab

bind -n C-M-o next-window
bind  -n M-Tab previous-window
# unbind -n C-M-o
# unbind -n C-S-Tab
bind-key Space switch-client -l
